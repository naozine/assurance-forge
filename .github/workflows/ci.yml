name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            configure: cmake -B build -G "Visual Studio 17 2022" -A x64
            build: cmake --build build --config Debug
            test: ctest --test-dir build -C Debug --output-on-failure --no-tests=error
          - name: Linux
            os: ubuntu-latest
            configure: cmake -B build -DHELLOIMGUI_DOWNLOAD_GLFW_IF_NEEDED=ON -DCMAKE_BUILD_TYPE=Debug
            build: cmake --build build
            test: ctest --test-dir build --output-on-failure --no-tests=error
          - name: macOS
            os: macos-latest
            configure: cmake -B build -DCMAKE_BUILD_TYPE=Debug
            build: cmake --build build
            test: ctest --test-dir build --output-on-failure --no-tests=error

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libgl1-mesa-dev libglu1-mesa-dev libgtk-3-dev

      - name: Configure CMake
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Run tests
        run: ${{ matrix.test }}
